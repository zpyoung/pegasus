name: Feature
description: Plan, implement, and test a new feature

execution:
  mode: session

defaults:
  model: sonnet
  max_turns: 10
  permission_mode: plan

stages:
  - id: plan
    name: Feature Planning
    prompt: |
      Plan the implementation for this feature in a {{project.language}} project:
      {{task.description}}
      List all files to create/modify and the exact changes needed.
      Use a web researcher to find any necessary information about libraries, APIs, or patterns to use.
      Ask the user at least 3 clarifying questions about the feature requirements before creating the plan.
    claude_flags:
      model: opus
      permission_mode: plan
    requires_approval: true

  - id: implement
    name: Implement Feature
    prompt: |
      Implement the feature according to the approved plan.
      Follow the existing code style and patterns.
    claude_flags:
      model: sonnet
      permission_mode: acceptEdits
    requires_approval: false

  - id: review
    name: Code Review
    prompt: |
      Review the implemented code for correctness, style, and potential issues.
      Suggest any improvements. Use pal clink codex to assist with the review.
    claude_flags:
      permission_mode: acceptEdits
